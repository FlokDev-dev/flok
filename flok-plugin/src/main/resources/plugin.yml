name: Flok
version: '1.0.0'
main: yaluv.flok.FlokPlugin
api-version: '1.21'
description: Lightweight server scripting engine..
authors: [ wbog ]
website: 'https://flokdev-dev.github.io/flok/#/'

commands:
  flok:
    description: Flok admin command
    usage: /flok <reload | debug | info | list | storage>
    permission: flok.admin
    aliases: [ fk ]

permissions:
  flok.admin:
    description: Access to /flok admin commands
    default: op
